name: Airpi Chasey 25.12 QModem

on:
  workflow_dispatch:
  push:
    branches:
      - airpi-chasey-25.12
  schedule:
    - cron: '18 20 * * *'

permissions:
  contents: write

env:
  SOURCE_REPO: https://github.com/chasey-dev/immortalwrt-mt798x-rebase.git
  SOURCE_BRANCH: 25.12
  TZ: Asia/Shanghai

jobs:
  preflight:
    name: Airpi preflight only
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout config repository
        uses: actions/checkout@v4

      - name: Install minimal preflight dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git python3 unzip ca-certificates rsync

      - name: Clone source for preflight
        run: |
          rm -rf wrt
          git clone --depth 1 --filter=blob:none --sparse -b 25.12 https://github.com/chasey-dev/immortalwrt-mt798x-rebase.git wrt
          cd wrt
          git sparse-checkout set .github config defconfig include package scripts target feeds.conf.default Makefile rules.mk Config.in

      - name: Run Airpi import and defconfig preflight
        run: |
          cd wrt

          echo "===== preflight: import old MTK packages and daed feed ====="
          bash "$GITHUB_WORKSPACE/Scripts/import_airpi_old_and_daed.sh"

          echo "===== preflight: minimal feeds update/install ====="
          ./scripts/feeds update -a
          ./scripts/feeds install -a -p qmodem || true
          ./scripts/feeds install -a -p daede || true
          ./scripts/feeds install luci luci-base luci-compat luci-app-firewall || true
          ./scripts/feeds install luci-app-ttyd luci-app-upnp luci-app-autoreboot || true
          ./scripts/feeds install luci-app-diskman luci-app-filemanager luci-app-package-manager || true
          ./scripts/feeds install luci-app-argon-config luci-theme-argon luci-theme-bootstrap || true

          echo "===== preflight: target config ====="
          if [ -f defconfig/mt7981-ax3000.config ]; then
            cp -f defconfig/mt7981-ax3000.config .config
          else
            : > .config
          fi

          cat >> .config <<'EOF'
CONFIG_TARGET_mediatek=y
CONFIG_TARGET_mediatek_filogic=y
CONFIG_TARGET_mediatek_filogic_DEVICE_airpi_ap3000m=y
CONFIG_CCACHE=y

CONFIG_PACKAGE_luci=y
CONFIG_PACKAGE_luci-base=y
CONFIG_PACKAGE_luci-compat=y
CONFIG_PACKAGE_luci-app-firewall=y

CONFIG_PACKAGE_qmodem=y
CONFIG_PACKAGE_luci-app-qmodem-next=y

CONFIG_PACKAGE_luci-app-Airpifanctrl=y
CONFIG_PACKAGE_kmod-Airpi-gpio-fan=y
CONFIG_PACKAGE_luci-app-mtk=y
CONFIG_PACKAGE_luci-app-mtwifi-cfg=y
CONFIG_PACKAGE_mtwifi-cfg-ucode=y
CONFIG_PACKAGE_luci-app-eqos-mtk=y
CONFIG_PACKAGE_luci-app-turboacc-mtk=y

CONFIG_PACKAGE_daed=y
CONFIG_PACKAGE_luci-app-daede=y

# CONFIG_PACKAGE_luci-app-openclash is not set
# CONFIG_PACKAGE_luci-app-istorex is not set
# CONFIG_PACKAGE_luci-app-istore is not set
# CONFIG_PACKAGE_luci-app-store is not set
# CONFIG_PACKAGE_luci-app-aurora-config is not set
# CONFIG_PACKAGE_luci-theme-aurora is not set
EOF

          echo "===== preflight: make defconfig ====="
          make defconfig

          echo "===== preflight: Airpi fan visibility ====="
          grep -Ein "Airpifanctrl|airpifanctrl|Airpi-gpio-fan|airpi-gpio-fan" .config tmp/.config-package.in 2>/dev/null || true
          find package/kernel/Airpi-gpio-fan package/airpi-mtk-applications/luci-app-Airpifanctrl -maxdepth 5 -type f 2>/dev/null | sort || true

          echo "===== preflight: required config check ====="
          for sym in \
            CONFIG_PACKAGE_luci-app-Airpifanctrl \
            CONFIG_PACKAGE_kmod-Airpi-gpio-fan \
            CONFIG_PACKAGE_luci-app-mtk \
            CONFIG_PACKAGE_luci-app-mtwifi-cfg \
            CONFIG_PACKAGE_luci-app-eqos-mtk \
            CONFIG_PACKAGE_luci-app-turboacc-mtk \
            CONFIG_PACKAGE_qmodem \
            CONFIG_PACKAGE_luci-app-qmodem-next \
            CONFIG_PACKAGE_daed \
            CONFIG_PACKAGE_luci-app-daede
          do
            if ! grep -q "^${sym}=y$" .config; then
              echo "ERROR: required config not enabled: ${sym}"
              exit 1
            fi
          done

          echo "===== preflight: forbidden package check ====="
          if grep -E '^CONFIG_PACKAGE_luci-app-(openclash|istorex|istore|store|aurora-config)=y$|^CONFIG_PACKAGE_luci-theme-aurora=y$' .config; then
            echo "ERROR: forbidden package enabled"
            exit 1
          fi

          echo "OK: Airpi preflight passed"


  build:
    runs-on: ubuntu-22.04

    needs: preflight
    steps:
      - name: Checkout airpi_cli
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext \
            gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 \
            libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev \
            libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool \
            libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full \
            patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools \
            qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl \
            unzip vim wget xmlto xxd zlib1g-dev zstd

      - name: Clone chasey-dev 25.12
        run: |
          git clone -b "$SOURCE_BRANCH" --single-branch --filter=blob:none "$SOURCE_REPO" wrt
          cd wrt
          echo "===== source commit ====="
          git log -1 --oneline

      - name: Verify Airpi AP3000M DTS and image target
        working-directory: wrt
        run: |
          echo "===== DTS file ====="
          find target/linux/mediatek -name '*airpi*ap3000m*dts*' -print | tee /tmp/airpi_dts_files.txt

          if ! grep -q 'mt7981b-airpi-ap3000m.dts' /tmp/airpi_dts_files.txt; then
            echo "ERROR: mt7981b-airpi-ap3000m.dts not found"
            exit 1
          fi

          echo
          echo "===== DTS content ====="
          grep -RInE 'model = "Airpi AP3000M"|compatible = "airpi,ap3000m"|mt7981b-airpi-ap3000m' target/linux/mediatek || {
            echo "ERROR: Airpi AP3000M DTS content not found"
            exit 1
          }

          echo
          echo "===== image device definition ====="
          grep -RInE 'DEVICE_.*airpi|airpi_ap3000m|mt7981b-airpi-ap3000m|Airpi AP3000M' target/linux/mediatek/image target/linux/mediatek || {
            echo "ERROR: Airpi AP3000M image device definition not found"
            exit 1
          }

      - name: Copy Airpi overlay files
        run: |
          mkdir -p wrt/files
          cp -rf files/* wrt/files/

      - name: Apply Airpi qmodem 25.12 full config
        working-directory: wrt
        run: |
          - name: Prepare OpenWrt cache dirs
            run: |
              mkdir -p wrt/dl wrt/.ccache
              echo "CONFIG_CCACHE_DIR=${GITHUB_WORKSPACE}/wrt/.ccache" >> "$GITHUB_ENV"

          - name: Cache OpenWrt dl and ccache
            uses: actions/cache@v4
            with:
              path: |
                wrt/dl
                wrt/.ccache
              key: openwrt-airpi-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('Scripts/**', 'Config/**', '.github/workflows/**') }}
              restore-keys: |
                openwrt-airpi-${{ runner.os }}-${{ github.ref_name }}-
                openwrt-airpi-${{ runner.os }}-

          bash "$GITHUB_WORKSPACE/Scripts/apply_chasey_25_12_full.sh"

      - name: Verify selected Airpi AP3000M target config
        working-directory: wrt
        run: |
          echo "===== final target config ====="
          grep -E '^CONFIG_TARGET_mediatek=y$|^CONFIG_TARGET_mediatek_filogic=y$|^CONFIG_TARGET_mediatek_filogic_DEVICE_airpi_ap3000m=y$' .config || true

          grep -q '^CONFIG_TARGET_mediatek_filogic_DEVICE_airpi_ap3000m=y$' .config || {
            echo "ERROR: final .config did not select CONFIG_TARGET_mediatek_filogic_DEVICE_airpi_ap3000m=y"
            exit 1
          }

      - name: Download sources
        working-directory: wrt
        run: |
          make download -j8 || make download -j1 V=s

      - name: Build firmware
        working-directory: wrt
        run: |
          make -j"$(nproc)" || make -j1 V=s

      - name: Collect firmware
        if: always()
        run: |
          mkdir -p artifact
          if [ -d wrt/bin/targets ]; then
            find wrt/bin/targets -type f \( -name '*.bin' -o -name '*.img' -o -name '*.itb' -o -name '*.manifest' -o -name '*.buildinfo' -o -name '*.json' \) -print -exec cp -f {} artifact/ \;
          fi
          echo "===== artifact files ====="
          ls -lah artifact || true

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: Airpi-qmodem-chasey-25.12
          path: artifact/

      - name: Verify Airpi package manifest
        if: always()
        run: |
          echo "===== find manifest ====="
          find wrt/bin/targets -name '*airpi_ap3000m*.manifest' -print | tee /tmp/airpi_manifest_files.txt || true

          MANIFEST="$(head -n1 /tmp/airpi_manifest_files.txt)"
          if [ -z "$MANIFEST" ]; then
            echo "WARN: manifest not found yet"
            exit 0
          fi

          echo "===== required packages ====="
          grep -E 'luci-app-[Aa]irpifanctrl|kmod-[Aa]irpi-gpio-fan|luci-app-mtk|mii_mgr|switch|luci-app-mtwifi-cfg|luci-app-eqos-mtk|luci-app-turboacc-mtk|qmodem|luci-app-qmodem-next|daed|luci-app-daede' "$MANIFEST" || {
            echo "ERROR: required package missing from manifest"
            exit 1
          }

          echo "===== forbidden packages ====="
          if grep -E 'luci-app-openclash|luci-app-istorex|luci-app-istore|luci-app-store|luci-app-aurora-config|luci-theme-aurora' "$MANIFEST"; then
            echo "ERROR: forbidden package found in manifest"
            exit 1
          fi

