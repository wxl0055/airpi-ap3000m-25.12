name: Airpi Chasey 25.12 QModem

on:
  workflow_dispatch:
  push:
    branches:
      - airpi-chasey-25.12
  schedule:
    - cron: '18 20 * * *'

permissions:
  contents: write

env:
  SOURCE_REPO: https://github.com/chasey-dev/immortalwrt-mt798x-rebase.git
  SOURCE_BRANCH: 25.12
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout airpi_cli
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext \
            gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 \
            libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev \
            libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool \
            libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full \
            patch pkgconf python3 python3-pip python3-ply python3-docutils python3-pyelftools \
            qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl \
            unzip vim wget xmlto xxd zlib1g-dev zstd

      - name: Clone chasey-dev 25.12
        run: |
          git clone -b "$SOURCE_BRANCH" --single-branch --filter=blob:none "$SOURCE_REPO" wrt
          cd wrt
          echo "===== source commit ====="
          git log -1 --oneline

      - name: Verify Airpi AP3000M DTS and image target
        working-directory: wrt
        run: |
          echo "===== DTS file ====="
          find target/linux/mediatek -name '*airpi*ap3000m*dts*' -print | tee /tmp/airpi_dts_files.txt

          if ! grep -q 'mt7981b-airpi-ap3000m.dts' /tmp/airpi_dts_files.txt; then
            echo "ERROR: mt7981b-airpi-ap3000m.dts not found"
            exit 1
          fi

          echo
          echo "===== DTS content ====="
          grep -RInE 'model = "Airpi AP3000M"|compatible = "airpi,ap3000m"|mt7981b-airpi-ap3000m' target/linux/mediatek || {
            echo "ERROR: Airpi AP3000M DTS content not found"
            exit 1
          }

          echo
          echo "===== image device definition ====="
          grep -RInE 'DEVICE_.*airpi|airpi_ap3000m|mt7981b-airpi-ap3000m|Airpi AP3000M' target/linux/mediatek/image target/linux/mediatek || {
            echo "ERROR: Airpi AP3000M image device definition not found"
            exit 1
          }

      - name: Copy Airpi overlay files
        run: |
          mkdir -p wrt/files
          cp -rf files/* wrt/files/

      - name: Prepare OpenWrt cache dirs
        run: |
          mkdir -p wrt/dl wrt/.ccache
          echo "CONFIG_CCACHE_DIR=${GITHUB_WORKSPACE}/wrt/.ccache" >> "$GITHUB_ENV"

      - name: Cache OpenWrt dl and ccache
        uses: actions/cache@v4
        with:
          path: |
            wrt/dl
            wrt/.ccache
          key: openwrt-airpi-${{ runner.os }}-${{ github.ref_name }}-dlccache-v1
          restore-keys: |
            openwrt-airpi-${{ runner.os }}-${{ github.ref_name }}-
            openwrt-airpi-${{ runner.os }}-

      - name: Apply Airpi qmodem 25.12 full config
        working-directory: wrt
        run: |
          bash "$GITHUB_WORKSPACE/Scripts/apply_chasey_25_12_full.sh"

      - name: Verify selected Airpi AP3000M target config
        working-directory: wrt
        run: |
          echo "===== final target config ====="
          grep -E '^CONFIG_TARGET_mediatek=y$|^CONFIG_TARGET_mediatek_filogic=y$|^CONFIG_TARGET_mediatek_filogic_DEVICE_airpi_ap3000m=y$' .config || true

          grep -q '^CONFIG_TARGET_mediatek_filogic_DEVICE_airpi_ap3000m=y$' .config || {
            echo "ERROR: final .config did not select CONFIG_TARGET_mediatek_filogic_DEVICE_airpi_ap3000m=y"
            exit 1
          }

      - name: Download sources
        working-directory: wrt
        run: |
          make download -j8 || make download -j1 V=s

      - name: Build firmware
        working-directory: wrt
        run: |
          make -j"$(nproc)" || make -j1 V=s

      - name: Collect firmware
        if: always()
        run: |
          mkdir -p artifact
          if [ -d wrt/bin/targets ]; then
            find wrt/bin/targets -type f \( -name '*.bin' -o -name '*.img' -o -name '*.itb' -o -name '*.manifest' -o -name '*.buildinfo' -o -name '*.json' \) -print -exec cp -f {} artifact/ \;
          fi
          echo "===== artifact files ====="
          ls -lah artifact || true

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: Airpi-qmodem-chasey-25.12
          path: artifact/

      - name: Verify Airpi package manifest
        if: always()
        run: |
          echo "===== find manifest ====="
          find wrt/bin/targets -name '*airpi_ap3000m*.manifest' -print | tee /tmp/airpi_manifest_files.txt || true

          MANIFEST="$(head -n1 /tmp/airpi_manifest_files.txt)"
          if [ -z "$MANIFEST" ]; then
            echo "WARN: manifest not found yet"
            exit 0
          fi

          echo "===== required packages ====="
          grep -E 'luci-app-[Aa]irpifanctrl|kmod-[Aa]irpi-gpio-fan|mii_mgr|switch|luci-app-mtwifi-cfg|luci-app-eqos-mtk|luci-app-turboacc-mtk|qmodem|luci-app-qmodem-next' "$MANIFEST" || {
            echo "ERROR: required package missing from manifest"
            exit 1
          }

          echo "===== forbidden packages ====="
          if grep -E 'luci-app-openclash|luci-app-istorex|luci-app-istore|luci-app-store|luci-app-aurora-config|luci-theme-aurora' "$MANIFEST"; then
            echo "ERROR: forbidden package found in manifest"
            exit 1
          fi
      - name: Generate release tag
        if: success()
        id: release_tag
        run: |
          echo "tag=build-$(date -u +'%Y.%m.%d-%H%M')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Airpi AP3000M ImmortalWrt 25.12 ${{ steps.release_tag.outputs.tag }}
          files: release_files/*
          draft: false
          prerelease: false
          generate_release_notes: true

